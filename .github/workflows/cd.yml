name: CD

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_REPO || format('{0}/sudoku-daily-ui', secrets.DOCKERHUB_USERNAME) }}:${{ steps.sha.outputs.sha }}
            ${{ vars.DOCKERHUB_REPO || format('{0}/sudoku-daily-ui', secrets.DOCKERHUB_USERNAME) }}:latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger infra deploy
        run: |
          curl -s -X POST https://api.github.com/repos/${{ github.repository_owner }}/sudoku-daily-infra/dispatches \
            -H "Authorization: Bearer ${{ secrets.INFRA_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"event_type":"deploy","client_payload":{"service":"ui","tag":"${{ steps.sha.outputs.sha }}"}}'
